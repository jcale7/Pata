<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Livre Patagonie</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.book {
  width: 3230px;
  height: 13920px;
  perspective: 2000px;
}

.page {
  width: 100%;
  height: 100%;
  position: absolute;
  background-size: cover;
  background-position: center;
  transition: transform 0.8s;
  transform-origin: left;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.hidden {
  transform: rotateY(-180deg);
  opacity: 0;
}

button {
  position: absolute;
  bottom: 20px;
  padding: 10px 20px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="book">

  <div class="page" id="p1" style="background-image:url('Couverture.png')"></div>
  <div class="page hidden" id="p2" style="background-image:url('Page1.png')"></div>
  <div class="page hidden" id="p3" style="background-image:url('Page2.png')"></div>
  <div class="page hidden" id="p4" style="background-image:url('Page3.png')"></div>

</div>

<button onclick="nextPage()">Tourner la page</button>

<script>
let current = 1;

function nextPage() {
  current++;

  let page = document.getElementById("p" + current);
  if (page) {
    page.classList.remove("hidden");
  }
}
</script>

</body>
</html>
